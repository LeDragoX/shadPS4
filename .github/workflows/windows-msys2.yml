name: Windows-MSYS2

on:
  push:
    branches: [ "main-bb" ]
  pull_request:
    branches: [ "main-bb" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: git mingw-w64-x86_64-binutils mingw-w64-x86_64-clang mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-ffmpeg mingw-w64-x86_64-ccache

    - name: Cache CMake dependency source code
      uses: actions/cache@v4
      env:
        cache-name: ${{runner.os}}-sdl-msys2-cache-cmake-dependency-sources
      with:
        path: | 
          ${{github.workspace}}/build
        key: ${{env.cache-name}}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
        restore-keys: |
          ${{env.cache-name}}-

    - name: Cache CMake dependency build objects
      uses: hendrikmuhs/ccache-action@v1.2.14
      env:
        cache-name: ${{runner.os}}-sdl-msys2-cache-cmake-dependency-builds
      with:
        append-timestamp: false
        key: ${{env.cache-name}}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -G "Ninja" -DCMAKE_C_COMPILER="clang.exe" -DCMAKE_CXX_COMPILER="clang++.exe" -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}} --parallel

    - name: Get date and git hash
      id: vars
      shell: pwsh
      run: |
        echo "date=$(Get-Date -Format 'yyyy-MM-dd')" >> $env:GITHUB_OUTPUT
        echo "shorthash=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: shadps4-win64-sdl-msys2-${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.shorthash }}
        path: |
          ${{github.workspace}}/build/shadPS4.exe
